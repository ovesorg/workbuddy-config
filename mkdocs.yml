site_name: WorkBuddy Shared Config
site_description: Centralized WorkBuddy configuration package — connector MCP templates,
  shared skills, and bootstrap tooling.
site_url: https://huashan_wang.github.io/workbuddy-config/
repo_name: Huashan_Wang/workbuddy-config
repo_url: https://github.com/Huashan_Wang/workbuddy-config
theme:
  name: material
  palette:
  - media: '(prefers-color-scheme: light)'
    scheme: default
    primary: indigo
    accent: indigo
    toggle:
      icon: material/brightness-7
      name: Switch to dark mode
  - media: '(prefers-color-scheme: dark)'
    scheme: slate
    primary: indigo
    accent: indigo
    toggle:
      icon: material/brightness-4
      name: Switch to light mode
  logo: docs/assets/logo.svg
  favicon: docs/assets/favicon.png
  features:
  - navigation.instant
  - navigation.tracking
  - toc.integrate
  - search.suggest
  - search.highlight
  - content.code.copy
  - navigation.top
  - navigation.instant.progress
  custom_dir: overrides
nav:
- Home: index.md
- Agent Orientation:
  - Agent Start Here: agent/start-here.md
  - WorkBuddy Setup (Agent): agent/workbuddy-setup.md
- Context:
  - Capabilities: context/capabilities.md
  - Workflows: context/workflows.md
  - Contracts: context/contracts.md
- ADR:
  - Index: adr/index.md
  - ADR-001: adr/001-credential-free-connectors.md
- Target Categories:
  - 分类概览: categories/CATEGORIES.md
  - MS Teams (Azure): categories/ms-teams.md
  - Odoo: categories/odoo.md
  - CloudFlare: categories/cloudflare.md
  - Social Platforms: categories/social-platforms.md
  - OneDrive: categories/onedrive.md
  - Documentation Sites: categories/documentation-sites.md
- Reference:
  - Connector Reference: reference/connector-reference.md
  - Skill Reference: reference/skill-reference.md
  - Overview: reference/index.md
  - Terminology: reference/terminology.md
  - External References: reference/external-references.md
markdown_extensions:
- pymdownx.highlight:
    anchor_linenums: true
- pymdownx.inlinehilite
- pymdownx.snippets
- pymdownx.superfences
- admonition
- pymdownx.details
- pymdownx.mark
- attr_list
- md_in_html
- tables
- toc:
    permalink: true
extra:
  generator: false
  oves_doc_version: 1.0.0
  oves_last_editor: Huashan Wang
  oves_revision_summary: Template-normalized doc site with 6 target categories
  oves_revision_date: '2026-05-18'
  oves_hub_integration:
    enabled: true
    cloud_home_url: https://docs.omnivoltaic.com/internal/consolidated-docs/
    local_home_url: http://127.0.0.1:8017/
plugins:
- search
- search:
    lang:
    - en
docs_dir: docs
site_dir: site
extra_css:
- stylesheets/extra.css
extra_javascript:
- javascripts/global-doc-home.js
copyright: Copyright &copy; 2025 Omnivoltaic Energy Solutions
hooks:
- hooks/update_date.py
- hooks/build_semantic_registry.py
exclude_docs: |
  en/
  fr/
  zh/
  *.fr.md
  *.zh.md
